# ─────────────────────────────────────────────
# Dialog: quest2 example
# Follows quest1 "yes" action.
# Demonstrates: after accepting quest -> follow-up info dialog.
# ─────────────────────────────────────────────

# Displayed at the top of the dialog window.
title: "<green><bold>⚔ Quest Started!"

# true  - Player can press ESC to close the dialog.
# false - Player must click the OK button to close.
can_close_with_escape: true

# Cooldown in seconds before the same player can open this dialog again.
# 0 = no cooldown (default).
cooldown: 0

# Dialog type:
# - notice: single OK button
# - confirmation: Yes / No buttons
type: notice

# No open_command - this dialog is opened programmatically by quest1.
open_command: ""

# Optional: permission required to use open_command.
# Leave empty ("") to allow all players.
open_permission: ""

body:
  - type: text
    content: "<gray>You received the quest item! Check your inventory."

  - type: item
    material: WRITTEN_BOOK
    count: 1

actions:
  ok:
    label: "<green>✔ Got it"
    after_actions:
      - type: message
        content: "<green>Good luck on your quest, <yellow><player></yellow>!"
      # Example command for start quest
      - type: command
        command: "start-quest-timer <player>"
